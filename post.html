<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <title>Post — Devlog — Marcelo Herrera Vásquez</title>

  <script>window.BLOG_BASE = 'https://raw.githubusercontent.com/mherreravsquez/blog-posts/main';</script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,500;0,700;0,900;1,700&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<div class="page">

<!-- NAV -->
<nav id="nav" class="scrolled">
  <a href="index.html" class="nav-logo">MH<span class="acc">V</span></a>
  <div class="nav-center">
    <a href="index.html#projects" class="nav-link" data-i18n="nav.projects">Projects</a>
    <a href="index.html#studio"   class="nav-link" data-i18n="nav.studio">Studio</a>
    <a href="blog.html"           class="nav-link active">Devlog</a>
    <a href="index.html#about"    class="nav-link" data-i18n="nav.about">About</a>
    <a href="index.html#contact"  class="nav-link" data-i18n="nav.contact">Contact</a>
  </div>
  <div class="nav-right">
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="es">ES</button>
    </div>
  </div>
</nav>

<!-- POST CONTENT -->
<article class="post-layout">

  <header class="post-header">
    <a href="blog.html" class="post-back" data-i18n="post.back">← Back to Devlog</a>

    <div id="post-tags" class="proj-tags" style="margin-bottom:14px;">
      <!-- Populated by JS -->
    </div>

    <h1 class="post-title" id="post-title">Loading...</h1>

    <div class="post-meta">
      <span id="post-date" style="font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--dim);"></span>
      <span id="post-type" class="bpc-type update"></span>
      <span id="post-project"></span>
    </div>
  </header>

  <div class="post-body" id="post-body">
    <div style="display:flex;align-items:center;gap:12px;padding:32px 0;font-family:var(--mono);font-size:11px;color:var(--dim);">
      <span class="loading-spinner"></span> Loading post...
    </div>
  </div>

  <!-- Post footer nav -->
  <div style="margin-top:60px;padding-top:32px;border-top:1px solid var(--line2);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;">
    <a href="blog.html" class="btn-dim" data-i18n="post.back">← Back to Devlog</a>
    <a href="index.html" class="btn-dim">Portfolio →</a>
  </div>

</article>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">MH<span>V</span></div>
  <div class="footer-copy">© 2025 Marcelo Herrera Vásquez</div>
  <div class="footer-right">
    <a href="index.html" class="footer-social">Portfolio</a>
    <a href="blog.html"  class="footer-social">Devlog</a>
  </div>
</footer>

</div><!-- .page -->

<script src="js/i18n.js"></script>
<script src="js/blogLoader.js"></script>
<script>
  document.addEventListener('mousemove', e => {
    const c = document.getElementById('cursor'), r = document.getElementById('cursor-ring');
    if (c) { c.style.left = e.clientX + 'px'; c.style.top = e.clientY + 'px'; }
    if (r) { r.style.left = e.clientX + 'px'; r.style.top  = e.clientY + 'px'; }
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => { if (window.I18n) I18n.setLang(btn.dataset.lang); });
  });
  document.addEventListener('DOMContentLoaded', async () => {
    if (window.I18n) await I18n.init();
    BlogLoader.renderSinglePost();
  });
  document.addEventListener('langchange', () => BlogLoader.renderSinglePost());
</script>
</body>
</html>
